<section class="page">
  <div class="agency-tool" data-agency-analyzer data-endpoint="https://functions.yandexcloud.net/d4ekhrgiv52qh61jqjls">
    <header class="agency-tool-header">
      <h1>Опишите свою ситуацию, которую вы хотите решить</h1>
      <p class="agency-tool-subtitle">Получите перевод на объективный язык.</p>
    </header>

    <form class="agency-form" data-aa-form>
      <div class="agency-input-shell" data-aa-input-shell>
        <textarea
          class="agency-textarea"
          data-aa-text
          maxlength="500"
          placeholder="Например: Я хочу изменить свою жизнь, но не знаю, с чего начать"
          required
        ></textarea>

        <div class="agency-filter-wrap" data-aa-filter-wrap>
          <button type="button" class="agency-filter-toggle" data-aa-filter-toggle aria-expanded="false" aria-haspopup="listbox">
            <span class="agency-filter-toggle-label" data-aa-current-filter-label>Формулировка: нейтральная</span>
            <span class="agency-filter-toggle-caret" aria-hidden="true">▾</span>
          </button>

          <div class="agency-filter-menu" data-aa-filter-menu hidden role="listbox" aria-label="Фильтр тона">
            <div class="agency-filter-item">
              <button type="button" data-aa-filter-option data-filter-key="neutral" class="agency-filter-option is-active">
                <span class="agency-filter-name">Нейтральный</span>
                <span class="agency-filter-meter" style="--aa-meter-color:#1ea971; --aa-meter-width:18%;"></span>
              </button>
              <a class="agency-filter-help" href="/irritability-conflict-mechanism/" title="Почему растет раздражительность при внутреннем конфликте" aria-label="Почему растет раздражительность при внутреннем конфликте">?</a>
            </div>

            <div class="agency-filter-item">
              <button type="button" data-aa-filter-option data-filter-key="direct" class="agency-filter-option">
                <span class="agency-filter-name">Прямолинейный</span>
                <span class="agency-filter-meter" style="--aa-meter-color:#6ccf5a; --aa-meter-width:36%;"></span>
              </button>
              <a class="agency-filter-help" href="/irritability-conflict-mechanism/" title="Почему растет раздражительность при внутреннем конфликте" aria-label="Почему растет раздражительность при внутреннем конфликте">?</a>
            </div>

            <div class="agency-filter-item">
              <button type="button" data-aa-filter-option data-filter-key="radical" class="agency-filter-option">
                <span class="agency-filter-name">Радикальный</span>
                <span class="agency-filter-meter" style="--aa-meter-color:#f2bf4f; --aa-meter-width:58%;"></span>
              </button>
              <a class="agency-filter-help" href="/irritability-conflict-mechanism/" title="Почему растет раздражительность при внутреннем конфликте" aria-label="Почему растет раздражительность при внутреннем конфликте">?</a>
            </div>

            <div class="agency-filter-item">
              <button type="button" data-aa-filter-option data-filter-key="aggressive" class="agency-filter-option">
                <span class="agency-filter-name">Агрессивный</span>
                <span class="agency-filter-meter" style="--aa-meter-color:#ea7f35; --aa-meter-width:78%;"></span>
              </button>
              <a class="agency-filter-help" href="/irritability-conflict-mechanism/" title="Почему растет раздражительность при внутреннем конфликте" aria-label="Почему растет раздражительность при внутреннем конфликте">?</a>
            </div>

            <div class="agency-filter-item">
              <button type="button" data-aa-filter-option data-filter-key="toxic" class="agency-filter-option">
                <span class="agency-filter-name">Токсичный</span>
                <span class="agency-filter-meter" style="--aa-meter-color:#d33a2f; --aa-meter-width:96%;"></span>
              </button>
              <a class="agency-filter-help" href="/irritability-conflict-mechanism/" title="Почему растет раздражительность при внутреннем конфликте" aria-label="Почему растет раздражительность при внутреннем конфликте">?</a>
            </div>
          </div>
        </div>

        <div class="agency-actions agency-submit-inline" data-aa-submit-row>
          <button type="submit" class="agency-primary-btn" aria-label="Получить перевод" title="Получить перевод">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
              <path d="M4 12h13m0 0-5-5m5 5-5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="agency-counter"><span data-aa-char-count>0</span>/500</div>
    </form>

    <section class="agency-output" data-aa-output hidden>
      <div class="agency-loader" data-aa-loader>
        <span class="agency-loader-spinner" aria-hidden="true"></span>
        <p>Анализирую формулировку и готовлю версии по всем фильтрам...</p>
      </div>

      <article class="agency-result" data-aa-result hidden>
        <p class="agency-source-label">Исходный текст</p>
        <p class="agency-source-text" data-aa-source-text></p>
        <p class="agency-filter-toggle-label" data-aa-result-filter></p>
        <h3>Объективная формулировка</h3>
        <p class="agency-result-text" data-aa-result-text></p>
        <h3>Разбор агентности</h3>
        <p class="agency-result-analysis" data-aa-result-analysis></p>
      </article>
    </section>

    <p class="agency-error" data-aa-error hidden></p>

    <div class="agency-actions" data-aa-retry-wrap hidden>
      <button type="button" class="agency-secondary-btn" data-aa-retry hidden>Попробовать еще раз</button>
    </div>

    <div class="agency-actions agency-how-wrap">
      <a class="agency-how-link" href="/irritability-conflict-mechanism/">Как это работает?</a>
    </div>
  </div>
</section>
