site:
  id: default
  base_url: "http://127.0.0.1:8080/" # must end with /
  media_base_url: "http://127.0.0.1:8080/media/" # local fallback; CI injects the deploy media URL automatically
  title: "Антон Ложкин"
  description: "Личный портал"
  default_og_image: "/assets/main.webp"
runtime:
  mode: "auto" # auto|dev|prod
  dev:
    base_url: "http://127.0.0.1:8080/"
    media_base_url: "http://127.0.0.1:8080/media/"
  # Production URLs are normally inferred by the build script.
  # Add a root CNAME file for a custom domain, or set NOTEPUB_BASE_URL / NOTEPUB_MEDIA_BASE_URL.
content:
  source: "local"
  local_dir: "./content"
paths:
  file_root: ./.notepub
  artifacts_dir: ./.notepub/artifacts
  snapshot_file: ./.notepub/snapshot/objects.json
  cache_root: ./.notepub/cache
theme:
  dir: "."
  name: "theme"
  templates_subdir: "templates"
  assets_subdir: "assets"
rules_path: "./rules.yaml"
server:
  listen: "127.0.0.1:8080"
cache:
  html_ttl_seconds: 600
  stale_if_error_seconds: 604800
