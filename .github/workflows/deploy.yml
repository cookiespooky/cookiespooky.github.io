name: Deploy Personal Portal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOTEPUB_VERSION: v0.1.7
      NOTEPUB_BIN: ./notepub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download notepub binary
        run: |
          curl -L -o notepub "https://github.com/cookiespooky/notepub/releases/download/${NOTEPUB_VERSION}/notepub_linux_amd64"
          chmod +x notepub

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          NOTEPUB_CONFIG: ./config.yaml
          NOTEPUB_BASE_URL: ${{ vars.NOTEPUB_BASE_URL }}
          NOTEPUB_MEDIA_BASE_URL: ${{ vars.NOTEPUB_MEDIA_BASE_URL }}
          GITHUB_PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: ./scripts/build.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
